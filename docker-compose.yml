version: '3.8'

services:
  # Compilation du projet dans un environnement isolé
  build:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ./build-output:/output
    command: >
      sh -c "cp -r /app/build/DnD_DM_Toolbox /output/ &&
             cp -r /app/build/resources /output/ &&
             cp -r /app/build/plugins /output/"
    profiles:
      - build

  # Lancement de l'application (nécessite X11 sur l'hôte)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./dnd_toolbox.db:/app/dnd_toolbox.db
    environment:
      - DISPLAY=${DISPLAY}
    network_mode: host
    profiles:
      - run
